<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consortium PWA</title>
    <!-- PWA Meta -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7d5fff">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1063/1063376.png">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#0b0e14',
                        accent: '#7d5fff',
                        'accent-hover': '#9c88ff',
                        glass: 'rgba(255, 255, 255, 0.03)',
                    }
                }
            }
        }
    </script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0e14; color: #e6edf3; }
        h1, h2, h3 { font-family: 'Outfit', sans-serif; }
        .glass-blur { backdrop-filter: blur(20px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .premium-gradient {
            background: linear-gradient(to right, #7d5fff, #ff5fcc, #7d5fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }
        
        @keyframes shine {
            to { background-position: 200% center; }
        }
        
        .glow-focus:focus-within {
            box-shadow: 0 0 20px rgba(125, 95, 255, 0.3);
            border-color: rgba(125, 95, 255, 0.5);
        }
        
        .card-glass {
            background: rgba(255, 255, 255, 0.015);
            border: 1px solid rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(30px);
            border-radius: 2rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }
        
        .card-glass:hover {
            border-color: rgba(125, 95, 255, 0.15);
            background: rgba(255, 255, 255, 0.025);
            transform: translateY(-4px);
        }

        #sidebar.open { transform: translateX(0) !important; }
        
        .sidebar-item.active {
            background: rgba(125, 95, 255, 0.15);
            color: #7d5fff;
            border-right: 3px solid #7d5fff;
        }
    </style>
</head>
<body class="bg-dark text-gray-200 overflow-hidden h-screen flex">

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-[#0b0e14] border-r border-white/5 glass-blur transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out">
        <div class="p-6 h-full flex flex-col">
            <div class="flex items-center justify-between mb-10">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-accent to-pink-600 flex items-center justify-center font-bold text-white shadow-lg shadow-accent/20">C</div>
                    <span class="text-2xl font-bold tracking-tight">Consortium</span>
                </div>
                <button id="close-sidebar" class="md:hidden text-gray-400">✕</button>
            </div>
            
            <nav class="flex-1">
                <ul class="space-y-2" id="page-list">
                    <li data-page="home" class="sidebar-item active cursor-pointer p-4 rounded-xl flex items-center gap-4 transition-all hover:bg-white/5">
                        <span class="w-5 text-center">🏠</span> <span>Dashboard</span>
                    </li>
                    <li data-page="projects" class="sidebar-item cursor-pointer p-4 rounded-xl text-gray-400 flex items-center gap-4 transition-all hover:bg-white/5 hover:text-white">
                        <span class="w-5 text-center">📂</span> <span>Projects</span>
                    </li>
                    <li data-page="tasks" class="sidebar-item cursor-pointer p-4 rounded-xl text-gray-400 flex items-center gap-4 transition-all hover:bg-white/5 hover:text-white">
                        <span class="w-5 text-center">✅</span> <span>Tasks</span>
                    </li>
                    <li data-page="chat" class="sidebar-item cursor-pointer p-4 rounded-xl text-gray-400 flex items-center gap-4 transition-all hover:bg-white/5 hover:text-white">
                        <span class="w-5 text-center">🤖</span> <span>AI Assistant</span>
                    </li>
                    <li data-page="settings" class="sidebar-item cursor-pointer p-4 rounded-xl text-gray-400 flex items-center gap-4 transition-all hover:bg-white/5 hover:text-white">
                        <span class="w-5 text-center">⚙️</span> <span>Settings</span>
                    </li>
                </ul>
            </nav>
            
            <div class="mt-auto space-y-3">
                <button id="install-btn" class="hidden w-full p-4 bg-accent text-white rounded-xl text-sm font-bold shadow-lg shadow-accent/20 hover:scale-[1.02] transition-all">
                    📲 Install App
                </button>
                <div class="p-4 rounded-2xl bg-white/5 border border-white/5 text-[10px] text-gray-500 uppercase tracking-widest text-center">
                    Studio Mobile v2.0
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full md:ml-64 relative bg-[#0b0e14]">
        <!-- Top Bar -->
        <header class="h-20 border-b border-white/5 flex items-center justify-between px-8 bg-[#0b0e14]/50 glass-blur sticky top-0 z-40">
            <button id="menu-toggle" class="md:hidden p-2 text-gray-400">☰</button>
            
            <div class="max-w-2xl w-full mx-4 glow-focus bg-white/5 border border-white/10 rounded-2xl px-4 py-2 transition-all flex items-center gap-3">
                <span class="text-gray-500">🔍</span>
                <input type="text" id="omnibox" placeholder="Rechercher ou commander..." class="w-full bg-transparent border-none outline-none text-sm text-gray-200">
            </div>
            
            <div class="flex items-center gap-6">
                <button class="relative text-gray-400 hover:text-white transition-colors">
                    🔔 <span class="absolute -top-1 -right-1 w-2 h-2 bg-pink-500 rounded-full"></span>
                </button>
                <div class="flex items-center gap-3 pl-4 border-l border-white/10">
                    <div class="text-right hidden sm:block">
                        <div class="text-xs font-bold">Gasmar</div>
                        <div class="text-[10px] text-gray-500">Premium Plan</div>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-gray-700 to-gray-900 border border-white/10 flex items-center justify-center font-bold text-xs">AV</div>
                </div>
            </div>
        </header>

        <!-- Scrollable Content -->
        <section id="editor" class="flex-1 overflow-y-auto p-8 md:p-12 no-scrollbar">
            <div class="flex justify-between items-end mb-12">
                <div>
                    <h1 id="page-title" contenteditable="true" class="text-5xl font-bold mb-3 outline-none premium-gradient">Dashboard</h1>
                    <p class="text-gray-500 text-sm">Professional tool for high productivity.</p>
                </div>
                <button class="px-6 py-3 bg-accent/20 border border-accent/30 text-accent rounded-2xl font-bold text-sm hover:bg-accent hover:text-white transition-all">
                    + Command
                </button>
            </div>
            
            <div id="blocks-container" class="grid grid-cols-1 xl:grid-cols-2 gap-8 items-start">
                <!-- Les cartes (To-do, Projets) vont se mettre ici côte à côte -->
            </div>
            
            <div class="mt-8 opacity-0 hover:opacity-100 transition-opacity pb-24">
                <button id="add-block-btn" class="text-gray-500 text-2xl hover:text-accent">+</button>
            </div>
        </section>

        <!-- Bottom Navigation (Mobile Only) -->
        <nav id="bottom-nav" class="md:hidden fixed bottom-0 inset-x-0 bg-dark/80 border-t border-white/10 glass-blur px-6 py-3 flex justify-between items-center z-50">
            <button data-page="home" class="nav-btn flex flex-col items-center gap-1 text-accent">
                <span class="text-xl">🏠</span>
                <span class="text-[10px] uppercase font-bold tracking-tighter">Home</span>
            </button>
            <button data-page="tasks" class="nav-btn flex flex-col items-center gap-1 text-gray-500">
                <span class="text-xl">✅</span>
                <span class="text-[10px] uppercase font-bold tracking-tighter">Tasks</span>
            </button>
            <button data-page="projects" class="nav-btn flex flex-col items-center gap-1 text-gray-500">
                <span class="text-xl">📂</span>
                <span class="text-[10px] uppercase font-bold tracking-tighter">Lab</span>
            </button>
            <button data-page="chat" class="nav-btn flex flex-col items-center gap-1 text-gray-500">
                <span class="text-xl">🤖</span>
                <span class="text-[10px] uppercase font-bold tracking-tighter">AI</span>
            </button>
        </nav>
    </main>

    <!-- Block Menu -->
    <div id="block-menu" class="fixed hidden z-[100] w-48 bg-[#1c2128] border border-white/10 rounded-xl shadow-2xl p-2 animate-in fade-in zoom-in duration-200">
        <div class="menu-item p-2 hover:bg-white/5 rounded-lg cursor-pointer flex items-center gap-3 text-sm" data-type="text"><span>📝</span> Texte</div>
        <div class="menu-item p-2 hover:bg-white/5 rounded-lg cursor-pointer flex items-center gap-3 text-sm" data-type="todo"><span>✅</span> To-do List</div>
        <div class="menu-item p-2 hover:bg-white/5 rounded-lg cursor-pointer flex items-center gap-3 text-sm" data-type="header"><span>H1</span> Titre</div>
        <div class="menu-item p-2 hover:bg-white/5 rounded-lg cursor-pointer flex items-center gap-3 text-sm" data-type="table"><span>📊</span> Tableau</div>
    </div>

    <!-- PWA Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('SW Registered', reg))
                .catch(err => console.log('SW Failed', err));
            });
        }
    </script>
    <script src="app.js"></script>
</body>
</html>
