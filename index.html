<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consortium PWA</title>
    <!-- PWA Meta -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7d5fff">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1063/1063376.png">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#0b0e14',
                        accent: '#7d5fff',
                        'accent-hover': '#9c88ff',
                        glass: 'rgba(255, 255, 255, 0.03)',
                    }
                }
            }
        }
    </script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0e14; color: #e6edf3; }
        h1, h2, h3 { font-family: 'Outfit', sans-serif; }
        .glass-blur { backdrop-filter: blur(12px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .premium-gradient {
            background: linear-gradient(to right, #7d5fff, #ff5fcc, #7d5fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }
        
        @keyframes shine {
            to { background-position: 200% center; }
        }
    </style>
</head>
<body class="bg-dark text-gray-200 overflow-hidden h-screen flex">

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-dark border-r border-white/10 glass-blur transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out">
        <div class="p-6 h-full flex flex-col">
            <div class="flex items-center justify-between mb-8">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-accent to-pink-500 flex items-center justify-center font-bold text-white">C</div>
                    <span class="text-xl font-bold tracking-tight">Consortium</span>
                </div>
                <button id="close-sidebar" class="md:hidden text-gray-400">✕</button>
            </div>
            
            <nav class="flex-1">
                <ul class="space-y-1" id="page-list">
                    <li data-page="home" class="page-item active cursor-pointer p-3 rounded-xl bg-accent/10 text-accent flex items-center gap-3 transition-all hover:bg-white/5">
                        <span>🏠</span> Général
                    </li>
                    <li data-page="tasks" class="page-item cursor-pointer p-3 rounded-xl text-gray-400 flex items-center gap-3 transition-all hover:bg-white/5 hover:text-white">
                        <span>✅</span> Tâches
                    </li>
                    <li data-page="projects" class="page-item cursor-pointer p-3 rounded-xl text-gray-400 flex items-center gap-3 transition-all hover:bg-white/5 hover:text-white">
                        <span>📂</span> Projets
                    </li>
                    <li data-page="chat" class="page-item cursor-pointer p-3 rounded-xl text-gray-400 flex items-center gap-3 transition-all hover:bg-white/5 hover:text-white">
                        <span>🤖</span> Chat
                    </li>
                </ul>
            </nav>
            
            <div class="mt-auto">
                <button class="w-full p-3 border border-dashed border-white/10 rounded-xl text-sm text-gray-500 hover:border-accent hover:text-accent transition-all">
                    + Nouvelle Page
                </button>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full md:ml-64 relative">
        <!-- Top Bar -->
        <header class="h-16 border-b border-white/10 flex items-center justify-between px-6 bg-dark/50 glass-blur sticky top-0 z-40">
            <button id="menu-toggle" class="md:hidden p-2 text-gray-400">☰</button>
            
            <div class="max-w-lg w-full mx-4">
                <input type="text" id="omnibox" placeholder="Rechercher ou URL..." class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent transition-all">
            </div>
            
            <div class="flex items-center gap-3">
                <span class="text-xs text-gray-500 hidden sm:inline">Consortium Pro</span>
                <div class="w-9 h-9 rounded-full bg-white/5 border border-white/10 flex items-center justify-center font-bold text-xs">AV</div>
            </div>
        </header>

        <!-- Scrollable Editor -->
        <section id="editor" class="flex-1 overflow-y-auto p-6 md:p-12 max-w-4xl mx-auto w-full no-scrollbar">
            <h1 id="page-title" contenteditable="true" class="text-4xl font-bold mb-10 outline-none premium-gradient">Chargement...</h1>
            <div id="blocks-container" class="space-y-4">
                <!-- Blocks injected by JS -->
            </div>
            
            <div class="mt-8 opacity-0 hover:opacity-100 transition-opacity">
                <button id="add-block-btn" class="text-gray-500 text-2xl hover:text-accent">+</button>
            </div>
        </section>
    </main>

    <!-- Block Menu -->
    <div id="block-menu" class="fixed hidden z-[100] w-48 bg-[#1c2128] border border-white/10 rounded-xl shadow-2xl p-2 animate-in fade-in zoom-in duration-200">
        <div class="menu-item p-2 hover:bg-white/5 rounded-lg cursor-pointer flex items-center gap-3 text-sm" data-type="text"><span>📝</span> Texte</div>
        <div class="menu-item p-2 hover:bg-white/5 rounded-lg cursor-pointer flex items-center gap-3 text-sm" data-type="todo"><span>✅</span> To-do List</div>
        <div class="menu-item p-2 hover:bg-white/5 rounded-lg cursor-pointer flex items-center gap-3 text-sm" data-type="header"><span>H1</span> Titre</div>
        <div class="menu-item p-2 hover:bg-white/5 rounded-lg cursor-pointer flex items-center gap-3 text-sm" data-type="table"><span>📊</span> Tableau</div>
    </div>

    <!-- PWA Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('SW Registered', reg))
                .catch(err => console.log('SW Failed', err));
            });
        }
    </script>
    <script src="app.js"></script>
</body>
</html>
