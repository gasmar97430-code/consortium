<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consortium PWA</title>
    <!-- PWA Meta -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7d5fff">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1063/1063376.png">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#0b0e14',
                        accent: '#7d5fff',
                        'accent-hover': '#9c88ff',
                        glass: 'rgba(255, 255, 255, 0.03)',
                    }
                }
            }
        }
    </script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0e14; color: #e6edf3; }
        h1, h2, h3 { font-family: 'Outfit', sans-serif; }
        .glass-blur { backdrop-filter: blur(20px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .premium-gradient {
            background: linear-gradient(135deg, #7d5fff, #ff5fcc, #7d5fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s ease-in-out infinite;
        }
        
        @keyframes shine {
            to { background-position: 200% center; }
        }
        
        .glow-focus:focus-within {
            box-shadow: 0 0 40px rgba(125, 95, 255, 0.5);
            border-color: rgba(125, 95, 255, 0.7);
        }
        
        .card-glass {
            background: rgba(17, 20, 28, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(50px);
            border-radius: 2.5rem;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }
        
        .neon-bar {
            box-shadow: 0 0 12px rgba(125, 95, 255, 0.6);
            border-radius: 99px;
        }

        #sidebar.open { transform: translateX(0) !important; }
        
        .sidebar-item.active {
            background: rgba(125, 95, 255, 0.1);
            color: #7d5fff;
        }
        
        .sidebar-item.active div {
            background: rgba(125, 95, 255, 0.2);
            color: #7d5fff;
            border-color: rgba(125, 95, 255, 0.3);
        }
    </style>
</head>
<body class="bg-dark text-gray-200 overflow-hidden h-screen flex">

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-[#0b0e14] border-r border-white/5 glass-blur transform -translate-x-full xl:translate-x-0 transition-transform duration-300 ease-in-out">
        <div class="p-8 h-full flex flex-col">
            <div class="flex items-center justify-between mb-12">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-accent to-pink-600 flex items-center justify-center font-bold text-white shadow-xl shadow-accent/30 text-xl">C</div>
                    <span class="text-2xl font-bold tracking-tighter">Consortium</span>
                </div>
                <button id="close-sidebar" class="xl:hidden text-gray-400">✕</button>
            </div>
            
            <nav class="flex-1 overflow-y-auto no-scrollbar">
                <ul class="space-y-4" id="page-list">
                    <li data-page="home" class="sidebar-item active cursor-pointer p-2 rounded-2xl flex items-center gap-4 transition-all hover:bg-white/5">
                        <div class="w-12 h-12 rounded-xl bg-white/5 flex items-center justify-center text-xl">🏠</div>
                        <span class="font-semibold text-gray-300">Dashboard</span>
                    </li>
                    <li data-page="projects" class="sidebar-item cursor-pointer p-2 rounded-2xl flex items-center gap-4 transition-all hover:bg-white/5 group">
                        <div class="w-12 h-12 rounded-xl bg-transparent border border-white/5 flex items-center justify-center text-xl group-hover:bg-white/5 transition-all">📂</div>
                        <span class="font-medium text-gray-500 group-hover:text-white">Projects</span>
                    </li>
                    <li data-page="tasks" class="sidebar-item cursor-pointer p-2 rounded-2xl flex items-center gap-4 transition-all hover:bg-white/5 group">
                        <div class="w-12 h-12 rounded-xl bg-transparent border border-white/5 flex items-center justify-center text-xl group-hover:bg-white/5 transition-all">✅</div>
                        <span class="font-medium text-gray-500 group-hover:text-white">Tasks</span>
                    </li>
                    <li data-page="calendar" class="sidebar-item cursor-pointer p-2 rounded-2xl flex items-center gap-4 transition-all hover:bg-white/5 group">
                        <div class="w-12 h-12 rounded-xl bg-transparent border border-white/5 flex items-center justify-center text-xl group-hover:bg-white/5 transition-all">📅</div>
                        <span class="font-medium text-gray-500 group-hover:text-white">Calendar</span>
                    </li>
                    <li data-page="settings" class="sidebar-item cursor-pointer p-2 rounded-2xl flex items-center gap-4 transition-all hover:bg-white/5 group mt-8">
                        <div class="w-12 h-12 rounded-xl bg-transparent border border-white/5 flex items-center justify-center text-xl group-hover:bg-white/5 transition-all">⚙️</div>
                        <div class="flex-1 flex justify-between items-center">
                            <span class="font-medium text-gray-500 group-hover:text-white">Settings</span>
                            <span class="text-[10px] text-gray-600">▼</span>
                        </div>
                    </li>
                </ul>
            </nav>
            
            <div class="mt-auto pt-8 border-t border-white/5">
                <button id="install-btn" class="hidden w-full p-4 bg-accent text-white rounded-2xl text-sm font-bold shadow-2xl shadow-accent/40 hover:scale-[1.02] transition-all">
                <div class="mt-4 flex items-center gap-3 p-2 rounded-2xl hover:bg-white/5 cursor-pointer group">
                    <div class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center text-gray-400 group-hover:text-white">⚙️</div>
                    <span class="text-sm font-medium text-gray-500 group-hover:text-white">System Settings</span>
                </div>
            </div>
        </div>
    </aside>

    <!-- Sidebar for Desktop (Always Toggleable now) -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-[#0b0e14] border-r border-white/5 z-50 transform -translate-x-full transition-transform duration-300 ease-in-out glass-blur">
        <div class="p-8 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-accent rounded-xl flex items-center justify-center text-white font-black text-xl shadow-lg shadow-accent/20">C</div>
                <h1 class="text-xl font-black tracking-tighter text-white">CONSORTIUM</h1>
            </div>
            <button id="close-sidebar" class="p-2 text-gray-500 hover:text-white transition-all">✕</button>
        </div>
        
        <nav class="px-4 py-6">
            <ul id="page-list" class="space-y-2">
                <li data-page="home" class="flex items-center gap-4 px-6 py-4 text-accent bg-accent/10 rounded-2xl cursor-pointer group transition-all">
                    <span class="text-xl">🏠</span>
                    <span class="font-bold tracking-tight">Dashboard</span>
                </li>
                <li data-page="projects" class="flex items-center gap-4 px-6 py-4 text-gray-500 hover:text-white hover:bg-white/5 rounded-2xl cursor-pointer group transition-all">
                    <span class="text-xl">📂</span>
                    <span class="font-bold tracking-tight">Le Lab</span>
                </li>
                <li data-page="tasks" class="flex items-center gap-4 px-6 py-4 text-gray-500 hover:text-white hover:bg-white/5 rounded-2xl cursor-pointer group transition-all">
                    <span class="text-xl">✅</span>
                    <span class="font-bold tracking-tight">Tâches</span>
                </li>
                <li data-page="ai" class="flex items-center gap-4 px-6 py-4 text-gray-500 hover:text-white hover:bg-white/5 rounded-2xl cursor-pointer group transition-all">
                    <span class="text-xl">🤖</span>
                    <span class="font-bold tracking-tight">Antigravity</span>
                </li>
            </ul>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full relative bg-[#0b0e14] overflow-hidden">
        <!-- Top Bar -->
        <header class="h-20 md:h-24 border-b border-white/5 flex items-center justify-between px-4 md:px-10 bg-[#0b0e14]/50 glass-blur sticky top-0 z-40">
            <button id="menu-toggle" class="p-2 md:p-3 text-gray-400 bg-white/5 rounded-xl hover:text-white transition-all">☰</button>
            
            <div class="flex-1 max-w-xl mx-2 md:mx-4 glow-focus bg-[#1a1f26] border border-white/5 rounded-2xl px-3 md:px-6 py-2 md:py-3 transition-all flex items-center gap-2 md:gap-4">
                <span class="text-gray-500 text-base md:text-lg">🔍</span>
                <input type="text" id="omnibox" placeholder="Rechercher..." class="w-full bg-transparent border-none outline-none text-xs md:text-base text-gray-200 placeholder-gray-600">
            </div>
            
            <div class="flex items-center gap-3 md:gap-8">
                <button id="ai-quick-toggle" class="relative group p-2 bg-accent/10 border border-accent/20 rounded-xl hover:bg-accent transition-all shadow-lg shadow-accent/20">
                    <span class="text-xl md:text-2xl group-hover:scale-110 transition-transform block">🤖</span>
                    <span class="absolute -bottom-1 -right-1 w-3 h-3 bg-green-500 border-2 border-[#0b0e14] rounded-full"></span>
                </button>
                <button class="relative text-gray-400 hover:text-white transition-all">
                    <span class="text-xl md:text-2xl">🔔</span>
                    <span class="absolute top-0 right-0 w-2 h-2 bg-red-500 border-2 border-[#0b0e14] rounded-full"></span>
                </button>
                <div class="flex items-center gap-2 md:gap-4 pl-2 md:pl-8 border-l border-white/10 group cursor-pointer">
                    <div class="w-9 h-9 md:w-12 md:h-12 rounded-full overflow-hidden border-2 border-white/10 group-hover:border-accent transition-all">
                        <img src="https://i.pravatar.cc/150?u=gasmar" alt="Avatar" class="w-full h-full object-cover">
                    </div>
                </div>
            </div>
        </header>

        <!-- Scrollable Content -->
        <section id="editor" class="flex-1 overflow-y-auto p-4 md:p-8 lg:p-12 no-scrollbar w-full">
            <div class="max-w-6xl mx-auto w-full relative z-10">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-10 md:mb-16 gap-6 w-full">
                    <div class="w-full">
                        <h1 id="page-title" contenteditable="true" class="text-4xl md:text-6xl lg:text-8xl font-black mb-4 outline-none premium-gradient leading-none tracking-tighter">Bienvenue</h1>
                        <p class="text-gray-400 text-[10px] md:text-base font-medium opacity-80 uppercase tracking-widest">Outil professionnel pour une productivité maximale.</p>
                    </div>
                    <button class="w-full md:w-auto px-6 md:px-8 py-3 md:py-4 bg-accent/20 border border-accent/30 text-accent rounded-2xl font-bold text-sm hover:bg-accent hover:text-white transition-all shadow-lg shadow-accent/10 mt-2 whitespace-nowrap">
                        + Commander
                    </button>
                </div>
                
                <!-- Grid Layout: Sidebar(fixed) + 2 columns in main content = 3 Columns Total -->
                <div id="blocks-container" class="grid grid-cols-1 lg:grid-cols-2 gap-6 lg:gap-10 items-start w-full pb-32 md:pb-10">
                    <!-- Les cartes Dashboard (To-do, Projets) sont injectées ici -->
                </div>
                
                <div class="mt-12 flex justify-center opacity-0 hover:opacity-100 transition-opacity pb-32">
                    <button id="add-block-btn" class="w-12 h-12 rounded-full border border-dashed border-white/20 text-gray-500 hover:border-accent hover:text-accent transition-all">+</button>
                </div>
            </div>
        </section>

        <!-- Bottom Navigation (Universal) -->
        <nav id="bottom-nav" class="fixed bottom-0 inset-x-0 bg-dark/80 border-t border-white/10 glass-blur px-2 md:px-6 py-3 md:py-4 flex justify-between items-center z-50">
            <button data-page="home" class="nav-btn flex flex-col items-center gap-1 text-accent flex-1">
                <span class="text-xl md:text-2xl">🏠</span>
                <span class="text-[8px] md:text-[10px] uppercase font-bold tracking-tighter">Home</span>
            </button>
            <button data-page="tasks" class="nav-btn flex flex-col items-center gap-1 text-gray-500 flex-1">
                <span class="text-xl md:text-2xl">✅</span>
                <span class="text-[8px] md:text-[10px] uppercase font-bold tracking-tighter">Tasks</span>
            </button>
            <button data-page="projects" class="nav-btn flex flex-col items-center gap-1 text-gray-500 flex-1">
                <span class="text-xl md:text-2xl">📂</span>
                <span class="text-[8px] md:text-[10px] uppercase font-bold tracking-tighter">Lab</span>
            </button>
            <button data-page="calendar" class="nav-btn flex flex-col items-center gap-1 text-gray-500 flex-1">
                <span class="text-xl md:text-2xl">📅</span>
                <span class="text-[8px] md:text-[10px] uppercase font-bold tracking-tighter">Plan</span>
            </button>
            <button data-page="settings" class="nav-btn flex flex-col items-center gap-1 text-gray-500 flex-1">
                <span class="text-xl md:text-2xl">⚙️</span>
                <span class="text-[8px] md:text-[10px] uppercase font-bold tracking-tighter">Set</span>
            </button>
        </nav>
    </main>

    <!-- Block Menu -->
    <div id="block-menu" class="fixed hidden z-[100] w-48 bg-[#1c2128] border border-white/10 rounded-xl shadow-2xl p-2 animate-in fade-in zoom-in duration-200">
        <div class="menu-item p-2 hover:bg-white/5 rounded-lg cursor-pointer flex items-center gap-3 text-sm" data-type="text"><span>📝</span> Texte</div>
        <div class="menu-item p-2 hover:bg-white/5 rounded-lg cursor-pointer flex items-center gap-3 text-sm" data-type="todo"><span>✅</span> To-do List</div>
        <div class="menu-item p-2 hover:bg-white/5 rounded-lg cursor-pointer flex items-center gap-3 text-sm" data-type="header"><span>H1</span> Titre</div>
        <div class="menu-item p-2 hover:bg-white/5 rounded-lg cursor-pointer flex items-center gap-3 text-sm" data-type="table"><span>📊</span> Tableau</div>
    </div>

    <!-- PWA Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('SW Registered', reg))
                .catch(err => console.log('SW Failed', err));
            });
        }
    </script>
    <script src="app.js?v=3.6"></script>
</body>
</html>
